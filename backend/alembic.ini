# Alembic configuration for LKML Patent Platform

[alembic]
# script_location 指向 alembic 目录（相对于 alembic.ini 所在路径）
script_location = alembic

# 模板生成文件名前缀使用日期
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 时区
timezone = UTC

# 默认连接串会被 env.py 覆盖（从 settings.DATABASE_URL 读取）
sqlalchemy.url = postgresql://lkml:lkml_secret@localhost:35432/lkml_patent

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
