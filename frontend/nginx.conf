# ==========================================================
#  nginx 配置文件
#  - 托管 Vite 构建的 SPA 静态资源
#  - 反向代理 /api/ 到后端服务
#  - 支持 WebSocket 升级
#  - 开启 gzip 压缩与静态资源缓存
# ==========================================================

# ---------- WebSocket 连接映射 ----------
# http 块级别 map 指令，用于 Upgrade 头映射
# 当客户端发起 WebSocket 时，$connection_upgrade 值为 "upgrade"；否则为 "close"
# 该指令必须在 server 块之外、http 上下文中定义（conf.d/*.conf 默认位于 http 块内）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    # 监听 80 端口
    listen       80;
    # 服务名（容器内可省略具体域名）
    server_name  _;

    # 静态资源根目录，对应 Dockerfile 中 COPY 的产物路径
    root   /usr/share/nginx/html;
    # 默认首页文件
    index  index.html;

    # ---------- gzip 压缩配置 ----------
    # 开启 gzip 压缩，减小传输体积（远程访问高延迟场景下尤其关键）
    gzip on;
    # 大于 1KB 的响应才压缩（更小的不值得压缩）
    gzip_min_length 1024;
    # 压缩级别（1-9，6 为性能与压缩比平衡点）
    gzip_comp_level 6;
    # 需要压缩的响应类型
    gzip_types
        text/html
        text/plain
        text/css
        application/javascript
        application/x-javascript
        application/json
        application/xml
        image/svg+xml;
    # 对启用代理的请求也压缩，并在响应头中附加 Vary: Accept-Encoding
    gzip_vary on;
    # 压缩缓冲区：以 4KB × 8 共 32KB 缓冲，减少随机 IO
    gzip_buffers 8 4k;

    # ---------- 后端 API 反向代理 ----------
    # 将 /api/ 开头的请求转发到后端服务
    # （Docker Compose / K8s 网络中通过服务名 backend 解析到后端容器）
    location /api/ {
        proxy_pass http://backend:8000;

        # 透传原始 Host 与客户端 IP，后端可获取真实调用方信息
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 升级支持（针对 /api/v1/history/jobs/ 等实时推送连接）
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # WebSocket 长连接超时设置（避免空闲断开）
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # ---------- 静态资源缓存 ----------
    # Vite 构建产物以 hash 命名（index-XXXX.js），内容变化即文件名变化，可永久缓存
    # 远程访问高延迟场景下，二次访问只需请求 index.html（几 KB），其余走浏览器缓存
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 其他静态文件（favicon、图片等）短缓存 1 小时
    location ~* \.(svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ---------- SPA 路由回退 ----------
    # 前端使用 React Router 客户端路由，所有未匹配静态文件的路径回退到 index.html
    # index.html 本身不缓存，确保用户总能拿到最新版本
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
